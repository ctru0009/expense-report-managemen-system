services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expenseapp
      POSTGRES_PASSWORD: expenseapp_pass
      POSTGRES_DB: expense_reports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseapp -d expense_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://expenseapp:expenseapp_pass@postgres:5432/expense_reports
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy}
      UPLOAD_DIR: /app/uploads
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
